<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>
<body>
    <div class="topnav">
        <a href="index.html">Home</a>
        <a href="Login.html">Login</a>
        <a href="Register.html">Register</a>
    </div>
    <h1> Registration Page</h1>
    <form>
    Username    <input type="text" minlength="5" placeholder="Please enter your username">
    <br><br>
    E-Mail    <input type="email" placeholder="Please enter your valid email">
    <br><br>
    Password    <input type="text" minlength="8" placeholder="Please enter Password">
    <br><br>
    Confirm Password    <input type="text" minlength="8" placeholder="Please re-enter Password">
    <br><br>
    <button onclick="location.href='Login.html'">Login</button>
    </form>
</body>
</html>
